<!-- Banner -->
  <section id="banner">
    <div class="content">
      {% for post in site.posts %}
      <header>
        <h1>{{post.title}}</h1>
        <p>{{post.date}}</p>
      </header>
      <p>{{post.summary}}</p>
      <ul class="actions">
        <li><a href="{{ post.url }}" class="button big">Learn More</a></li>
      </ul>
      {% endfor %}
    </div>
    <span class="image object">
      <img src="assets/images/pic10.jpg" alt="" />
    </span>
  </section>
